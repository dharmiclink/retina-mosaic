name: ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Resolve workspace
        run: |
          dart pub get
          dart run melos bootstrap
      - name: Analyze mobile
        working-directory: apps/mobile
        run: flutter analyze
      - name: Test mobile
        working-directory: apps/mobile
        run: flutter test
      - name: Test domain
        working-directory: packages/nexthria_domain
        run: flutter test
